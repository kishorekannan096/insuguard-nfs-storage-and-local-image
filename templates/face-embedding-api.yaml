apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-face-embedding-api
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: face-embedding-api
spec:
  replicas: {{ .Values.faceEmbeddingApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: face-embedding-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: face-embedding-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- include "insurguard.gpuNodeSelector" . | nindent 6 }}
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      initContainers:
        - name: seed-model-cache
          image: {{ .Values.faceEmbeddingApi.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              if [ -z "$(ls -A /cache 2>/dev/null)" ]; then
                echo "model-cache empty — seeding from image (if anything is baked in)..."
                cp -a /app/resources/. /cache/ 2>/dev/null || true
                echo "seed complete: $(ls -A /cache 2>/dev/null | wc -l) entries copied"
              else
                echo "model-cache already populated — skipping seed"
              fi
          volumeMounts:
            - name: model-cache
              mountPath: /cache
      containers:
        - name: face-embedding-api
          image: {{ .Values.faceEmbeddingApi.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            {{- range $key, $val := .Values.faceEmbeddingApi.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.faceEmbeddingApi.port }}
              name: http
          volumeMounts:
            - name: model-cache
              mountPath: /app/resources
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "insurguard.fullname" . }}-model-cache-face-embedding-api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-face-embedding-api
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.faceEmbeddingApi.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: face-embedding-api
    app.kubernetes.io/instance: {{ .Release.Name }}
