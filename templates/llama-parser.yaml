{{- if and (not .Values.llamaParser.localModelPath) (not .Values.llamaParser.modelProfile) (not .Values.nvidiaApiKey) }}
{{ fail "llama-parser needs llamaParser.localModelPath, llamaParser.modelProfile, or nvidiaApiKey set. With none of these, nim_llm_sdk.hub.ngc_injector.inject_ngc_hub falls through to its manifest/NGC profile-lookup path at startup — on a truly air-gapped network that call can't even resolve, so the pod hangs/crash-loops instead of failing fast. localModelPath is the recommended fix: set it to the absolute in-container path (under /opt/nim/.cache, matching your NFS-mounted nim-cache PVC) of an already-downloaded HF-format snapshot directory — inject_ngc_hub takes an early, NGC-free branch whenever NIM_MODEL_NAME resolves to an existing local directory, confirmed by reading nim_llm_sdk source directly. modelProfile (NIM_MODEL_PROFILE) is the older mechanism and still goes through manifest/NGC lookup." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insurguard.fullname" . }}-llama-parser
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
    app.kubernetes.io/name: llama-parser
spec:
  replicas: {{ .Values.llamaParser.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: llama-parser
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llama-parser
        app.kubernetes.io/instance: {{ .Release.Name }}
        insurguard/gpu-workload: "true"
        insurguard/nim-heavy: "true"
    spec:
      {{- include "insurguard.gpuTopologySpread" . | nindent 6 }}
      {{- include "insurguard.nimAntiAffinity" (dict "component" "llama-parser" "Release" .Release) | nindent 6 }}
      {{- include "insurguard.gpuNodeSelector" . | nindent 6 }}
      securityContext:
        {{- include "insurguard.securityContext" . | nindent 8 }}
      {{- if .Values.ngcImagePull.enabled }}
      imagePullSecrets:
        - name: {{ include "insurguard.imagePullSecretName" . }}
      {{- end }}
      containers:
        - name: llama-parser
          image: {{ .Values.llamaParser.image }}
          securityContext:
            {{- include "insurguard.containerSecurityContext" . | nindent 12 }}
          env:
            {{- range $key, $val := .Values.llamaParser.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.llamaParser.localModelPath }}
            - name: NIM_MODEL_NAME
              value: {{ .Values.llamaParser.localModelPath | quote }}
            {{- else if .Values.llamaParser.modelProfile }}
            - name: NIM_MODEL_PROFILE
              value: {{ .Values.llamaParser.modelProfile | quote }}
            {{- end }}
            {{- if .Values.nvidiaApiKey }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "insurguard.nvidiaSecretName" . }}
                  key: NGC_API_KEY
            {{- end }}
          ports:
            - containerPort: {{ .Values.llamaParser.port }}
              name: http
          volumeMounts:
            - name: nim-cache
              mountPath: /opt/nim/.cache
            - name: dshm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.llamaParser.gpu | quote }}
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: {{ .Values.llamaParser.port }}
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: {{ .Values.llamaParser.port }}
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: nim-cache
          persistentVolumeClaim:
            claimName: {{ include "insurguard.fullname" . }}-nim-cache-llama-parser
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.llamaParser.shmSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "insurguard.fullname" . }}-llama-parser
  labels:
    {{- include "insurguard.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.llamaParser.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: llama-parser
    app.kubernetes.io/instance: {{ .Release.Name }}
